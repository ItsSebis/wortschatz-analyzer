version: "3.9"

services:
  app:
    image: itssebis/wortschatz-analyzer:latest
    container_name: wortschatz_app
    develop:
      watch:
        - action: rebuild
          path: Dockerfile
          target: .
    env_file:
      - .env
    expose:
      - "5000"
    volumes:
      - /data:/mnt/test/admin/data

  nginx:
    image: nginx:latest
    container_name: wortschatz_proxy
    ports:
      - "8000:80"
      - "8081:81"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app