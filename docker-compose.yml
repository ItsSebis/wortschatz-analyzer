version: "3.9"

services:
  app:
    image: itssebis/wortschatz-analyzer:latest
    deploy:
      resources:
        limits:
          cpus: '6'    # Maximum 0.5 CPU cores
          memory: 8192M    # Maximum 512MB RAM
        reservations:
          cpus: '2'    # Guaranteed 0.25 CPU cores
          memory: 1024M    # Guaranteed 256MB RAM
    container_name: wortschatz_app
    develop:
      watch:
        - action: rebuild
          path: Dockerfile
          target: .
    env_file:
      - .env
    expose:
      - "5000"
    volumes:
      - /mnt/test/admin/data:/data

  nginx:
    image: nginx:latest
    container_name: wortschatz_proxy
    ports:
      - "8000:80"
      - "8081:81"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app